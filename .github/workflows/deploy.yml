name: Deploy Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/home/ubuntu/autobuilderautobuilder-worker
            git pull https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git main
            docker rmi autobuilder-worker-image -f || true
            docker build -t autobuilder-worker-image .
            docker rm -f autobuilder-worker-container || true
            docker run -d --name autobuilder-worker-container --restart unless-stopped autobuilder-worker-image

      - name: Discord Notification (Success)
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "✅ **autobuilder-worker** deployed successfully to VPS!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Discord Notification (Failure)
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "❌ **autobuilder-worker** deployment failed!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
